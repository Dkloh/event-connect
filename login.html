<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Event Scheduler account">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Login - EventConnect</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-container">
      <h1 class="nav-logo">EventConnect</h1>
    </div>
  </nav>

  <section class="auth-section">
    <div class="container">
      <div class="auth-container">
        
        <!-- Tab Switcher -->
        <div class="auth-tabs">
          <button id="loginTab" class="auth-tab active">Login</button>
          <button id="signupTab" class="auth-tab">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-form-container">
          <h2 class="auth-title">Welcome Back</h2>
          <p class="auth-subtitle">Sign in to your account</p>

          <!-- Google Sign In Button -->
          <button id="googleSignInBtn" class="btn btn-google btn-block">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="margin-right: 8px;">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continue with Google
          </button>

          <div class="divider">
            <span>or</span>
          </div>

          <form id="loginFormElement" class="auth-form">
            <div class="form-group">
              <label for="loginEmail" class="form-label">Email Address</label>
              <input 
                type="email" 
                id="loginEmail" 
                class="form-input" 
                required
                placeholder="you@example.com"
              >
              <span class="form-error" id="loginEmail-error"></span>
            </div>

            <div class="form-group">
              <label for="loginPassword" class="form-label">Password</label>
              <input 
                type="password" 
                id="loginPassword" 
                class="form-input" 
                required
                placeholder="Enter your password"
              >
              <span class="form-error" id="loginPassword-error"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Sign In
            </button>
          </form>

          <p class="auth-note">
            Don't have an account? <a href="#" id="switchToSignup" class="auth-link">Sign up</a>
          </p>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="auth-form-container" style="display: none;">
          <h2 class="auth-title">Create Account</h2>
          <p class="auth-subtitle">Sign up to register for events</p>

          <!-- Google Sign Up Button -->
          <button id="googleSignUpBtn" class="btn btn-google btn-block">
            <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="margin-right: 8px;">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Sign up with Google
          </button>

          <div class="divider">
            <span>or</span>
          </div>

          <form id="signupFormElement" class="auth-form">
            <div class="form-group">
              <label for="signupName" class="form-label">Full Name</label>
              <input 
                type="text" 
                id="signupName" 
                class="form-input" 
                required
                placeholder="John Doe"
              >
              <span class="form-error" id="signupName-error"></span>
            </div>

            <div class="form-group">
              <label for="signupEmail" class="form-label">Email Address</label>
              <input 
                type="email" 
                id="signupEmail" 
                class="form-input" 
                required
                placeholder="you@example.com"
              >
              <span class="form-error" id="signupEmail-error"></span>
            </div>

            <div class="form-group">
              <label for="signupPassword" class="form-label">Password</label>
              <input 
                type="password" 
                id="signupPassword" 
                class="form-input" 
                required
                placeholder="At least 6 characters"
                minlength="6"
              >
              <span class="form-error" id="signupPassword-error"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
              Create Account
            </button>
          </form>

          <p class="auth-note">
            Already have an account? <a href="#" id="switchToLogin" class="auth-link">Login</a>
          </p>
        </div>

        <!-- Loading Indicator -->
        <div id="authLoading" class="auth-loading" style="display: none;">
          <div class="spinner"></div>
          <p>Signing you in...</p>
        </div>

      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 EventConnect Demo. Secure authentication powered by Firebase.</p>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  
  <!-- App Scripts -->
  <!-- Core Firebase and Auth Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
  
  <!-- Security -->
  <script src="js/security.js"></script>
  
  <!-- Configuration and Authentication -->
  <script src="js/config.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-auth.js"></script>
  <script>
    // Enhanced form validation with security
    document.addEventListener('DOMContentLoaded', function() {
      const loginForm = document.getElementById('loginFormElement');
      const signupForm = document.getElementById('signupFormElement');
      
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          const email = document.getElementById('loginEmail') ? document.getElementById('loginEmail').value : '';
          if (email && !SecurityUtils.validateEmail(email)) {
            e.preventDefault();
            Analytics.trackEvent('validation_error', { type: 'invalid_email' });
          }
        });
      }
      
      if (signupForm) {
        signupForm.addEventListener('submit', function(e) {
          const email = document.getElementById('signupEmail') ? document.getElementById('signupEmail').value : '';
          const password = document.getElementById('signupPassword') ? document.getElementById('signupPassword').value : '';
          
          let isValid = true;
          
          if (email && !SecurityUtils.validateEmail(email)) {
            e.preventDefault();
            isValid = false;
            Analytics.trackEvent('validation_error', { type: 'invalid_email' });
          }
          
          if (password && password.length < 6) {
            e.preventDefault();
            isValid = false;
            Analytics.trackEvent('validation_error', { type: 'weak_password' });
          }
        });
      }
    });
  </script>
</body>
</html>
